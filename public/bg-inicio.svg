<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" fill="none">
  <!-- main river channel -->
  <path d="M 780 0 C 620 160, 720 320, 540 460 C 340 610, 560 760, 400 940 C 260 1100, 460 1220, 340 1400"
        stroke="#8B7FFF" stroke-width="6" stroke-linecap="round"/>

  <!-- current lines following the river, offset to each side -->
  <path d="M 840 0 C 690 150, 780 300, 610 440 C 420 590, 630 730, 480 900 C 350 1050, 540 1170, 430 1340"
        stroke="#8B7FFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 720 20 C 560 180, 660 330, 470 480 C 270 630, 490 780, 320 970 C 180 1130, 380 1250, 260 1400"
        stroke="#8B7FFF" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- ripple rings at bends -->
  <circle cx="620" cy="330" r="20" stroke="#8B7FFF" stroke-width="2"/>
  <circle cx="620" cy="330" r="34" stroke="#8B7FFF" stroke-width="1.4" opacity="0.6"/>

  <circle cx="370" cy="780" r="18" stroke="#8B7FFF" stroke-width="2"/>
  <circle cx="370" cy="780" r="30" stroke="#8B7FFF" stroke-width="1.4" opacity="0.6"/>

  <!-- small reed / grass tufts along the bank -->
  <g transform="translate(220,540)">
    <path d="M 0 40 C -4 10, -10 -10, -16 -34" stroke="#8B7FFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 8 40 C 8 8, 10 -14, 14 -38" stroke="#8B7FFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 16 40 C 22 14, 30 -2, 38 -20" stroke="#8B7FFF" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(560,1080)">
    <path d="M 0 40 C -4 10, -10 -10, -16 -34" stroke="#8B7FFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M 8 40 C 8 8, 10 -14, 14 -38" stroke="#8B7FFF" stroke-width="3" stroke-linecap="round"/>
  </g>

  <circle cx="740" cy="560" r="4" fill="#8B7FFF"/>
  <circle cx="180" cy="900" r="3" fill="#8B7FFF"/>
  <circle cx="560" cy="120" r="3" fill="#8B7FFF"/>
  <circle cx="260" cy="1220" r="4" fill="#8B7FFF"/>
</svg>
